schema_version: "1.0"

extension:
  id: "charter"
  name: "Charter — Constitution Composer"
  version: "0.1.0"
  description: "Compose project constitutions from shared fragment registries"
  author: "sakitA"
  repository: "https://github.com/Fyloss/spec-kit-charter"
  license: "MIT"
  homepage: "https://github.com/Fyloss/spec-kit-charter"

requires:
  speckit_version: ">=0.11.9"
  tools:
    - name: "git"
      required: false
  commands:
    - "speckit.constitution"

provides:
  commands:
    - name: "speckit.charter.config"
      file: "commands/speckit.charter.config.md"
      description: "Configure charter registry and select constitution fragments"
    - name: "speckit.charter.compose"
      file: "commands/speckit.charter.compose.md"
      description: "Compose and generate the project constitution from selected fragments"
    - name: "speckit.charter.add"
      file: "commands/speckit.charter.add.md"
      description: "Add a new fragment from the registry to the composition"
    - name: "speckit.charter.remove"
      file: "commands/speckit.charter.remove.md"
      description: "Remove a fragment from the composed constitution"
    - name: "speckit.charter.restore"
      file: "commands/speckit.charter.restore.md"
      description: "Restore the constitution to the last saved backup"

  config:
    - name: "charter-config.yml"
      template: "config-template.yml"
      description: "Charter extension configuration"
      required: false

hooks:
  before_constitution:
    command: "speckit.charter.compose"
    optional: true
    prompt: "Recompose constitution from charter fragments before updating?"
    description: "Optionally recompose constitution from fragments before manual constitution edits"

tags:
  - "constitution"
  - "governance"
  - "multi-repo"
  - "composition"
  - "fragments"
