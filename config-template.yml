# Charter Extension Configuration
# This is a reference template. The live config is stored at
# .specify/charter/config.yml and is normally created by /speckit.charter.config.

# Registry source — path (relative or absolute) or git URL
# Examples:
#   registry: ".charter"                          # local directory (default)
#   registry: "/shared/charter-registry"          # absolute path
#   registry: "git@github.com:org/charter.git"    # SSH git URL
#   registry: "https://github.com/org/charter"    # HTTPS git URL
registry: ".charter"

# Registry type — auto-detected from registry value
# Possible values: "directory", "git"
# Usually you don't need to set this manually
# registry_type: "auto"
